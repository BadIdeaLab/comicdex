name: flutter-workflow-apk

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Shared with flutter-workflow-ipa.yml: both workflows publish to the same
# `latest-build` release tag, and GitHub Actions runs triggered by the same
# push execute in parallel across workflows. Without this, both "Create
# Release" steps can race to create the release at the same time and end up
# creating two separate releases instead of one being updated.
concurrency:
  group: latest-build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.5

    - name: Get dependencies
      run: flutter pub get

    - name: Generate database code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Analyze
      run: flutter analyze

    - name: Test
      run: flutter test

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v3
      # if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: latest-build
        name: Latest Build
        draft: false
        prerelease: true
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          assets/tag_catalog.bin
          assets/tag_catalog.version
    
